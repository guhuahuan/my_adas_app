name: Build iOS IPA

on:
  push:
    branches: [ main ]  # 确保你的主分支名是 main，如果是 master 请修改
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest  # 必须使用 macOS 运行器

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true 

      - name: Install Dart Dependencies
        run: flutter pub get

      - name: Repair and Create iOS Project
        # 这一步会根据你的 pubspec.yaml 自动生成缺失的 ios/Runner.xcodeproj 等文件
        run: flutter create . --platforms=ios

      - name: Install CocoaPods
        # iOS 编译的核心依赖管理，必须运行
        run: |
          cd ios
          pod install
          cd ..

      - name: Build iOS App Bundle
        # 生成未签名的 .app 构建产物
        run: flutter build ios --release --no-codesign

      - name: Create IPA Package for Sideloadly
        # 将 .app 包装成 .ipa 格式，方便在 Windows 上通过 Sideloadly 安装
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ADAS_HelloWorld.ipa Payload

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: ADAS-App-Package
          path: ADAS_HelloWorld.ipa
