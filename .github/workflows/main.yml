name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许你手动点击按钮触发运行

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 1. 彻底初始化项目，确保 ios 目录存在
      - name: Force Create iOS Project
        run: |
          flutter create --platforms=ios .
          flutter pub get

      # 2. 补全 CocoaPods 环境 (这步容易出错，增加失败重试)
      - name: Install CocoaPods
        run: |
          cd ios
          # 如果 Podfile 丢失，强制创建默认的
          if [ ! -f "Podfile" ]; then
            pod init
          fi
          pod install || pod install --repo-update
          cd ..

      # 3. 执行 iOS 编译
      - name: Build iOS App Bundle
        run: |
          flutter build ios --release --no-codesign --verbose

      # 4. 转换为 IPA 格式 (Sideloadly 必备)
      - name: Create IPA Package
        run: |
          mkdir -p Payload
          # 寻找生成的 .app 文件并移动
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "错误：找不到编译出的 .app 文件"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r ADAS_HelloWorld.ipa Payload

      # 5. 上传成品
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ADAS-App-Package
          path: ADAS_HelloWorld.ipa
